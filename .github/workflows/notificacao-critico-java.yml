name: Deploy Java project to Azure Function App - dev_lucas

on:
  push:
    branches: ["feature/notificacao-critico"]

env:
  AZURE_FUNCTIONAPP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
  PACKAGE_DIRECTORY: '.'
  JAVA_VERSION: '21'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    # Sem 'environment:' aqui — o subject OIDC fica como branch ref,
    # que é exatamente o que o federated credential 'feature/notificacao-critico' espera.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Configurar Java ${{ env.JAVA_VERSION }}'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'microsoft'
          cache: 'maven'

      - name: 'Build com Maven'
        shell: pwsh
        run: |
          pushd './${{ env.PACKAGE_DIRECTORY }}'
          mvn clean package
          popd

      - name: 'Descobrir diretório do pacote'
        id: find-package
        shell: pwsh
        run: |
          $funcDir = Get-ChildItem -Path './${{ env.PACKAGE_DIRECTORY }}/target/azure-functions' -Directory | Select-Object -First 1
          echo "FUNC_PACKAGE_PATH=$($funcDir.FullName)" >> $env:GITHUB_ENV

      - name: 'Login no Azure'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: 'Configurar variáveis no Function App'
        shell: pwsh
        run: |
          az functionapp config appsettings set `
            --name ${{ secrets.AZURE_FUNCTIONAPP_NAME }} `
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} `
            --settings `
              DB_URL="${{ secrets.DB_URL }}" `
              DB_USERNAME="${{ secrets.DB_USERNAME }}" `
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}" `
              MAIL_HOST="${{ secrets.MAIL_HOST }}" `
              MAIL_PORT="${{ secrets.MAIL_PORT }}" `
              MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" `
              MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" `
              MAIL_FROM="${{ secrets.MAIL_FROM }}" `
              RELATORIO_EMAIL_DESTINATARIO="${{ secrets.RELATORIO_EMAIL_DESTINATARIO }}" `
              APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}" `
              FUNCTIONS_WORKER_RUNTIME="java" `
              WEBSITE_RUN_FROM_PACKAGE="0" `
              'RELATORIO_SCHEDULE="0 0 0 * * 0"'

      - name: 'Deploy para Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: '${{ secrets.AZURE_FUNCTIONAPP_NAME }}'
          slot-name: 'Production'
          package: '${{ env.FUNC_PACKAGE_PATH }}'