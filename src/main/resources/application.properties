# =============================================================================
# Datasource PostgreSQL compartilhado com o serviï¿½o de submissï¿½o de feedbacks
# As variaveis de ambiente substituem os valores padrï¿½o em produï¿½ï¿½o
# =============================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}

# Hibernate nï¿½o gerencia o schema, o Flyway cuida das migrations
quarkus.hibernate-orm.database.generation=none

# =============================================================================
# Flyway migrations automaticas em produï¿½ï¿½o
# =============================================================================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# =============================================================================
# E-mail (SMTP) configurar via variaveis de ambiente em produï¿½ï¿½o
# Para Gmail use smtp.gmail.com:587 com uma App Password
# =============================================================================
quarkus.mailer.host=${MAIL_HOST:smtp.gmail.com}
quarkus.mailer.port=${MAIL_PORT:587}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${MAIL_USERNAME:changeme@gmail.com}
quarkus.mailer.password=${MAIL_PASSWORD:changeme}
quarkus.mailer.from=${MAIL_FROM:noreply@techchallenge.com.br}

# Destinatï¿½rio padrï¿½o do relatï¿½rio semanal
relatorio.email.destinatario=${RELATORIO_EMAIL_DESTINATARIO:admin@techchallenge.com.br}

# =============================================================================
# Azure Functions app configuraï¿½ï¿½es para deploy via azure-functions-maven-plugin
# =============================================================================
# Gera o artefato Quarkus sem o sufixo "-runner" para compatibilidade com
# o scriptFile gerado pelo azure-functions-maven-plugin.
quarkus.package.jar.add-runner-suffix=false
quarkus.azure-functions.app-name=${azure.function.app.name:avaliacoes-1778625830017}
quarkus.azure-functions.runtime.java-version=21

# =============================================================================
# OpenAPI / Swagger UI
# =============================================================================
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=Tech Challenge Relatï¿½rio API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Serviï¿½o serverless de geraï¿½ï¿½o de relatï¿½rios semanais de feedbacks

# =============================================================================
# Perfil de desenvolvimento PostgreSQL do docker-compose (pg-dev)
# =============================================================================
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=postgres
%dev.quarkus.datasource.password=postgres
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgres
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.flyway.enabled=true
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.repair-at-start=true
%dev.quarkus.mailer.mock=true

# =============================================================================
# Perfil de testes
# =============================================================================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:feedback_test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=import.sql
%test.quarkus.flyway.enabled=false
%test.quarkus.mailer.mock=true