# =============================================================================
# Datasource PostgreSQL compartilhado com o serviço de submissăo de feedbacks
# As variaveis de ambiente substituem os valores padrăo em produçăo
# =============================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}

# Hibernate năo gerencia o schema, o Flyway cuida das migrations
quarkus.hibernate-orm.database.generation=none

# =============================================================================
# Flyway migrations automaticas em produçăo
# =============================================================================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# =============================================================================
# E-mail (SMTP) configurar via variaveis de ambiente em produçăo
# Para Gmail use smtp.gmail.com:587 com uma App Password
# =============================================================================
quarkus.mailer.host=${MAIL_HOST:smtp.ethereal.email}
quarkus.mailer.port=${MAIL_PORT:587}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${MAIL_USERNAME:hyman.frami20@ethereal.email}
quarkus.mailer.password=${MAIL_PASSWORD:gRpETQYhaEhDS9xT6E}
quarkus.mailer.from=${MAIL_FROM:hyman.frami20@ethereal.email}

# Destinatário padrăo do relatório semanal
relatorio.email.destinatario=${RELATORIO_EMAIL_DESTINATARIO:hyman.frami20@ethereal.email}

# =============================================================================
# Azure Functions app configuraçőes para deploy via azure-functions-maven-plugin
# =============================================================================
quarkus.azure-functions.app-name=${azure.function.app.name:avaliacoes-1778625830017}
quarkus.azure-functions.runtime.java-version=21

${azure.function.app.name:tech-challenge-relatorio}

# =============================================================================
# OpenAPI / Swagger UI
# =============================================================================
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=Tech Challenge Relatório API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Serviço serverless de geraçăo de relatórios semanais de feedbacks

# =============================================================================
# Perfil de desenvolvimento PostgreSQL do docker-compose (pg-dev)
# =============================================================================
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=postgres
%dev.quarkus.datasource.password=postgres
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgres
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.flyway.enabled=true
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.repair-at-start=true
%dev.quarkus.mailer.mock=true

# =============================================================================
# Perfil de testes
# =============================================================================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:feedback_test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=import.sql
%test.quarkus.flyway.enabled=false
%test.quarkus.mailer.mock=true